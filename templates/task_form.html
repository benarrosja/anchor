{% extends "base.html" %}

{% block title %}{{ "Edit Task" if task else "Add Task" }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 520px;">
    <h2 class="fw-bold mb-1">{{ 'Edit task' if task else 'Add a task' }}</h2>
    <p class="text-muted mb-4">Keep it small, you can always break it down later.</p>

    <form method="POST" action="{{ url_for('edit_task', task_id=task.id) if task else url_for('add_task') }}">
        <label class="form-label fw-semibold">What do you need to do?</label>
        <input
            type="text"
            class="form-control form-control-lg mb-3"
            id="title"
            name="title"
            value="{{ task.title if task else '' }}"
            placeholder="e.g Write the instruction paragraph"
            required
        >

        <label class="form-label fw-semibold">Any extra details? (optional — AI uses this to breakdown tasks)</label>
        <textarea
            class="form-control mb-3"
            id="details"
            name="details"
            rows="3"
            placeholder="e.g. This report needs 3 sections and Harvard references"
        >{{ task.details if task and task.details else '' }}</textarea>

        <label class="form-label fw-semibold">When is it due? (optional)</label>
        <input
            type="date"
            class="form-control mb-3"
            id="deadline"
            name="deadline"
            value="{{ task.deadline.strftime('%Y-%m-%d') if task and task.deadline else '' }}"
        >

        <label class="form-label fw-semibold">How urgent is it?</label>
        <select class="form-select mb-3" id="priority" name="priority">
            <option value="1" {% if task and task.priority == 1 %}selected{% endif %}>Low- no rush</option>
            <option value="2" {% if not task or task.priority == 2 %}selected{% endif %}>Medium - this week</option>
            <option value="3" {% if task and task.priority == 3 %}selected{% endif %}>High - needs attention soon</option>
        </select>

        <label class="form-label fw-semibold">How long will it take?</label>
        <input
            type="number"
            class="form-control mb-2"
            id="estimate_mins"
            name="estimate_mins"
            value="{{ task.estimate_mins if task and task.estimate_mins else 25 }}"
            min="1"
            required
        >

        <div class="d-flex gap-2 mb-4 flex-wrap">
            <button type="button" class="btn btn-sm btn-outline-secondary estimate-chip" data-mins="5">5 min</button>
            <button type="button" class="btn btn-sm btn-outline-secondary estimate-chip" data-mins="15">15 min</button>
            <button type="button" class="btn btn-sm btn-outline-secondary estimate-chip" data-mins="25">25 min</button>
            <button type="button" class="btn btn-sm btn-outline-secondary estimate-chip" data-mins="45">45 min</button>
        </div>

        <button type="submit" class="btn btn-dark w-100">Save changes</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/task_form.js') }}"></script>
{% endblock %}
