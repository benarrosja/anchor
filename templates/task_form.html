{% extends "base.html" %}
{% block title %}Add Task{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="fw-bold mb-1"> Add a task</h2>
    <p class="text-muted mb-4">Keep it small - you can always break it down later.</p>
    
    <form method="POST">
        <div class="mb-4">
            <label for="title" class="form-label fw-semibold"> What do you need to do?</label>
            <input 
            type="text" 
            class="form-control form-control-lg" 
            id="title" 
            name="title"
            placeholder= "e.g Write the instruction Paragraph" 
            required>
        </div>

        <div class="mb-4">
            <label for="deadline" class="form-label fw-semibold">When is it due? <span class="text-muted">(optional)</span></label>
            <input 
                type="date"
                class="form-control"
                id="deadline" 
                name="deadline">
        </div>

        <div class="mb-4">
            <label for="priority" class="form-label fw-semibold">How urgent is it?</label>

                <select class="form-select" id="priority" name="priority">
                    <option value="1"> Low- no rush</option>
                    <option value="2" selected> Medium - this week</option>
                    <option value="3"> High - needs attention soon</option>
                </select>
                </div>

           
        <div class="mb-4">
            <label for="estimate_mins" class="form-label fw-semibold"> How long will it take?</label>
            <input
                type="number"
                class="form-control"
                id="estimate_mins"
                name="estimate_mins"
                value="25"
                min="1"
                required>
                </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary btn-sm"onclick=" setEstimate(5)">5 min</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick=" setEstimate(15)">15 min</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick=" setEstimate(25)">25 min</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="setEstimate(45)">45 min</button>
            </div>
            
        </div>

        <button type="submit" class="btn btn-dark btn-lg w-100">Add task</button>
    </form>
</div>

<script>
function setEstimate(mins) {
    document.getElementById('estimate_mins').value = mins;
}
</script>
{% endblock %}
