<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anchor — {% block title %}{% endblock %}</title> <!-- Jinjae blocks placeholder.Every other page fills it with its own HTML,So the nav bar and Bootstrap links appear everwhere automatically --> 
   
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
    >

    <style>
        body {
            background: #f7f8fc;
            color: #1f2937;
        }
        .navbar-anchor {
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
    }
     .brand-mark {
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #1a1a2e;
      text-decoration: none;
    }

    .page-shell {
      padding-top: 24px;
      padding-bottom:48px;
    }

    .task-card {
      background: #ffffff;
      border-radius:16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #eceef5;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
    }

    .task-title {
      font-weight: 600;
      font-size: 1rem;
      color: #1a1a2e;
    }

    .task-meta {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 4px;
    }

    .btn-primary-action {
      background: #212529;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .btn-primary-action:hover {
      background: #111827;
    }

    .btn-icon-ghost {
      background: transparent;
      border: none;
      color: #4b5563;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .btn-icon-ghost:hover {
      color: #111827;
    }

    .task-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .priority-high {
      border-left: 4px solid #dc3545;
    }

    .priority-medium {
      border-left: 4px solid #f59e0b;
    }

    .priority-low {
      border-left: 4px solid #6c757d;
    }

    .dropdown-menu-small {
      min-width: 140px;
      border-radius: 12px;
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-anchor">
    <div class="container">
      <a href="{{ url_for('dashboard') if session.get('user_id') else url_for('login') }}"
         class="brand-mark">
        ⚓ Anchor
      </a>

      {% if session.get('user_id') %}
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-muted small">{{ session.get('email') }}</span>
        <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-secondary">Log out</a>
      </div>
      {% endif %}
    </div>
  </nav>

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous">
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
