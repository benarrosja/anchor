<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor — {% block title %}{% endblock %}</title> <!-- Jinjae blocks placeholder.Every other page fills it with its own HTML,So the nav bar and Bootstrap links appear everwhere automatically --> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation bar: it will only show when logged in -->
    {% if session.get('user_id') %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold">⚓ Anchor</span>
        <div class="ms-auto d-flex gap-3 align-items-center">
            <span class="text-light small">{{ session.get('email') }}</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Log out</a>
        </div>
    </nav>
    {% endif %}

    <!-- Page content goes here -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
