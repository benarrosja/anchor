<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anchor — {% block title %}{% endblock %}</title> <!-- Jinjae blocks placeholder.Every other page fills it with its own HTML,So the nav bar and Bootstrap links appear everwhere automatically --> 
   
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
    >
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
       body {
            background: #f7f8fc;
            color: #1f2937;
        }
        .navbar-anchor {
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
    }
     .brand-mark {
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #1a1a2e;
      text-decoration: none;
    }

    .page-shell {
      padding-top: 24px;
      padding-bottom: 48px;}
  </style>

  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-anchor">
    <div class="container">
      <a href="{{ url_for('dashboard') if session.get('user_id') else url_for('login') }}"
         class="brand-mark">
        ⚓ Anchor
      </a>

      {% if session.get('user_id') %}
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-muted small">{{ session.get('email') }}</span>
        <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-secondary">Log out</a>
      </div>
      {% endif %}
    </div>
  </nav>

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous">
</script>

<script src="{{ url_for('static', filename='js/focus_mode.js') }}"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
